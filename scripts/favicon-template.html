<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #0a0a0b;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .tile {
      width: 100%;
      height: 100%;
      background: #0a0a0b;
      border-radius: 20%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .dot {
      position: absolute;
      top: 15%;
      right: 15%;
      width: 12%;
      height: 12%;
      background: #4ade80;
      border-radius: 50%;
    }
    .letter {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 60%;
      color: #4ade80;
      letter-spacing: -0.04em;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="tile">
    <div class="dot"></div>
    <div class="letter">G</div>
  </div>
</body>
</html>
